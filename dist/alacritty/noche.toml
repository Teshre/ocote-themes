# Ocote Themes — Noche
# Azules profundos para la madrugada.
# https://github.com/Teshre/ocote-themes

[colors.primary]
background = "#0C0E16"
foreground = "#CBD4EC"

[colors.cursor]
text   = "#0C0E16"
